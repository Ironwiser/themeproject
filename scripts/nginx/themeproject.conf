# ThemeProject – statik Vite build
# Placeholder'lar deploy.sh tarafından değiştirilir: __DOMAIN__, __WEB_ROOT__
# Kurulum: proje kökünden ./deploy.sh

server {
    listen 80;
    listen [::]:80;
    server_name __DOMAIN__;

    root __WEB_ROOT__;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location ~* \.(?:mp4|mp3|png|jpe?g|webp|gif|svg|ico|css|js|woff2?|ttf|otf)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }
}
